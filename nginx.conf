server {
    listen 80;
    server_name snackerietzonnetje.nl www.snackerietzonnetje.nl;

    root /var/www/tzonnetje-website;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Redirect naar HTTPS (uncomment als je SSL hebt via Certbot/Coolify)
    # return 301 https://$host$request_uri;
}

